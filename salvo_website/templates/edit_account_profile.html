{% extends 'base.html' %}

{% block title %}Edit Profile - {{ account.name }}{% endblock %}

{% block extra_css %}
<style>
    .edit-profile-card {
        background: var(--code-bg);
        border: 1px solid var(--border-glow);
        border-radius: 20px;
        padding: 2rem;
        margin: 2rem auto;
        max-width: 600px;
        box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2);
    }

    .form-label {
        color: var(--text-accent);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-control {
        background: rgba(15, 23, 42, 0.6);
        border: 2px solid rgba(0, 212, 255, 0.3);
        border-radius: 10px;
        color: var(--text-primary);
        padding: 12px 16px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: var(--accent-green);
        box-shadow: 0 0 0 0.2rem rgba(0, 255, 136, 0.25);
        background: rgba(15, 23, 42, 0.8);
    }

    .btn-save {
        background: linear-gradient(45deg, var(--primary-purple), var(--primary-blue));
        border: none;
        color: var(--dark-bg);
        font-weight: bold;
        padding: 10px 20px;
        border-radius: 25px;
        font-family: 'JetBrains Mono', monospace;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 1rem;
    }

    .btn-save:hover {
        background: linear-gradient(45deg, var(--primary-blue), var(--primary-purple));
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="edit-profile-card animate-on-scroll">
        <h2 class="code-font text-center mb-4" style="color: var(--accent-green);">
            <i class="fas fa-edit me-2"></i>Edit Profile
        </h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label for="name" class="form-label">Name</label>
                <input type="text" id="name" name="name" class="form-control" value="{{ account.name }}" required>
            </div>
            <div class="mb-4">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ account.sastra_email }}"
                    required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Leave blank to keep current password">
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-save">
                    <i class="fas fa-save me-2"></i>Save Changes
                </button>
                <button type="button" class="btn btn-danger" style="border-radius:25px;" onclick="confirmDelete()">
                    <i class="fas fa-trash-alt me-2"></i>Delete Account
                </button>
            </div>
        </form>
    </div>
</div>
<script>
    function confirmDelete() {
        if (confirm("⚠️ Are you sure you want to delete your account? This action cannot be undone!")) {
            window.location.href = "{% url 'delete_account' account.register_no %}";
        }
    }
</script>
{% endblock %}
